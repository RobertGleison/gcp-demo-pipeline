name: Extraction CI

on:
  pull_request:
    paths:
      - "etl/extraction/**"
      - ".github/workflows/extraction-ci.yml"

permissions:
  contents: read

jobs:
  test:
    name: Extraction tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: etl/extraction
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.9.29"

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Run pytest
        run: uv run pytest
