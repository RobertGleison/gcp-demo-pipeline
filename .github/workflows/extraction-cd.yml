name: Extraction CD

# Builds the extractor image and pushes it to Artifact Registry on every push to
# main that touches the extractor. Push-only: the next scheduled Cloud Run Job run
# pulls :latest automatically (no deploy step), keeping the split CD = artifacts,
# Terraform = infrastructure.
#
# Requires three repo secrets (Settings -> Secrets and variables -> Actions ->
# Secrets), taken from the `cicd` module's outputs after it's applied:
#   GCP_WIF_PROVIDER  <- module.cicd.wif_provider_name
#   GCP_DEPLOYER_SA   <- module.cicd.deployer_sa_email
#   GCP_ARTIFACT_REPO <- module.cicd.artifact_registry_repo
# These values aren't actually sensitive (provider name, SA email, repo path), so
# GitHub will mask them as *** in the build logs — harmless, just noisier output.

on:
  push:
    branches: [main]
    paths:
      - "etl/extraction/**"
      - ".github/workflows/extraction-cd.yml"

# Keyless auth: GitHub mints an OIDC token, WIF exchanges it for short-lived GCP
# credentials. id-token: write is what lets the job request that OIDC token.
permissions:
  contents: read
  id-token: write

# Serialize pushes so two runs don't race on the shared :latest tag.
concurrency:
  group: extraction-cd
  cancel-in-progress: false

jobs:
  build-push:
    name: Build & push extractor image
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Impersonates the deployer SA (artifactregistry.writer only) via WIF.
      # token_format: access_token gives us a token docker login can use directly.
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_DEPLOYER_SA }}
          token_format: access_token

      - name: Derive registry host
        run: echo "REGISTRY=${GCP_ARTIFACT_REPO%%/*}" >> "$GITHUB_ENV"
        env:
          GCP_ARTIFACT_REPO: ${{ secrets.GCP_ARTIFACT_REPO }}

      - name: Log in to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: etl/extraction/Dockerfile
          platforms: linux/amd64
          push: true
          tags: |
            ${{ secrets.GCP_ARTIFACT_REPO }}/extractor:${{ github.sha }}
            ${{ secrets.GCP_ARTIFACT_REPO }}/extractor:latest
